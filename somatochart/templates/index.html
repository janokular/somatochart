<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      type="image/svg"
      href="{{ url_for('static', filename='favicon.svg') }}"
    />
    <title>SomatoChart</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/offline-exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>
  </head>
  <body>
    <div id="chart"></div>
    <div id="list">
      <form id="add-athlete-form">
        <input type="number" name="endo" min="1" max="7" step="0.01" placeholder="ENDO" required />
        <input type="number" name="meso" min="1" max="7" step="0.01" placeholder="MESO" required />
        <input type="number" name="ecto" min="1" max="7" step="0.01" placeholder="ECTO" required />
        <input type="text" name="name" placeholder="NAME" required />
        <input type="text" name="color" placeholder="COLOR" required />
        <button type="submit">Add</button>
      </form>

      <form id="update-athlete-form">
        <input type="text" name="id" placeholder="ID" required />
        <input type="number" name="endo" min="1" max="7" step="0.01" placeholder="ENDO" required />
        <input type="number" name="meso" min="1" max="7" step="0.01" placeholder="MESO" required />
        <input type="number" name="ecto" min="1" max="7" step="0.01" placeholder="ECTO" required />
        <input type="text" name="name" placeholder="NAME" required />
        <input type="text" name="color" placeholder="COLOR" required />
        <button type="submit">Update</button>
      </form>

      <form id="delete-athlete-form">
        <input type="text" name="id" placeholder="ID" required />
        <button type="submit">Delete</button>
      </form>
    </div>
    <script src="{{ url_for('static', filename='chart.js') }}"></script>
  </body>
</html>
