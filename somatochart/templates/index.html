<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      type="image/svg"
      href="{{ url_for('static', filename='favicon.svg') }}"
    />
    <title>SomatoChart</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <script src="https://code.highcharts.com/modules/exporting.js"></script>
    <script src="https://code.highcharts.com/modules/offline-exporting.js"></script>
    <script src="https://code.highcharts.com/modules/export-data.js"></script>
    <script src="https://code.highcharts.com/modules/accessibility.js"></script>
  </head>
  <body>
    <div id="chart"></div>
    <ul id="list"></ul>
    <form id="add-form">
      <input
        type="number"
        name="endo"
        min="1"
        max="7"
        step="0.01"
        placeholder="ENDO"
        required
      />
      <input
        type="number"
        name="meso"
        min="1"
        max="7"
        step="0.01"
        placeholder="MESO"
        required
      />
      <input
        type="number"
        name="ecto"
        min="1"
        max="7"
        step="0.01"
        placeholder="ECTO"
        required
      />
      <input type="text" name="name" placeholder="Name" required />
      <select type="text" name="color">
        <option value="blue">Blue</option>
        <option value="green">Green</option>
        <option value="red">Red</option>
      </select>
      <select type="text" name="symbol">
        <option value="circle">Circle</option>
        <option value="square">Square</option>
        <option value="triangle">Triangle</option>
      </select>
      <input type="checkbox" id="visibilityToggle" checked />
      <button type="submit">Add</button>
    </form>

    <form id="update-form">
      <input type="text" name="id" placeholder="ID" required />
      <input
        type="number"
        name="endo"
        min="1"
        max="7"
        step="0.01"
        placeholder="ENDO"
        required
      />
      <input
        type="number"
        name="meso"
        min="1"
        max="7"
        step="0.01"
        placeholder="MESO"
        required
      />
      <input
        type="number"
        name="ecto"
        min="1"
        max="7"
        step="0.01"
        placeholder="ECTO"
        required
      />
      <input type="text" name="name" placeholder="Name" required />
      <select type="text" name="color">
        <option value="blue">Blue</option>
        <option value="green">Green</option>
        <option value="red">Red</option>
      </select>
      <select type="text" name="symbol">
        <option value="circle">Circle</option>
        <option value="square">Square</option>
        <option value="triangle">Triangle</option>
      </select>
      <input type="checkbox" id="updateVisibilityToggle" checked />
      <button type="submit">Update</button>
    </form>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
  </body>
</html>
